<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DaihonEiNews · 大本営発表</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17130f;
        --muted: #625847;
        --paper: #d6c8a5;
        --paper-light: #e7dbbb;
        --seal: #9f1d19;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Songti SC", "Noto Serif CJK SC", "Yu Mincho", serif;
        background:
          radial-gradient(circle at 50% 0, #53493b 0, transparent 45%),
          #211d18;
      }
      .page {
        width: min(920px, calc(100% - 24px));
        min-height: calc(100vh - 24px);
        margin: 12px auto;
        padding: clamp(18px, 4vw, 42px);
        background:
          linear-gradient(125deg, rgba(255,255,255,.14), transparent 45%),
          repeating-linear-gradient(0deg, rgba(62,45,25,.025) 0 1px, transparent 1px 4px),
          var(--paper);
        box-shadow: 0 18px 55px rgba(0,0,0,.55);
      }
      .banner {
        margin: calc(clamp(18px, 4vw, 42px) * -1) calc(clamp(18px, 4vw, 42px) * -1) 18px;
        padding: 7px 18px;
        display: flex;
        justify-content: space-around;
        color: var(--paper-light);
        background: var(--ink);
        font-weight: 700;
        letter-spacing: .35em;
      }
      header {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: end;
        gap: 12px;
        padding-bottom: 14px;
        border-bottom: 6px double var(--ink);
      }
      .brand { color: var(--seal); font-family: monospace; font-weight: 700; }
      h1 { margin: 0; font-size: clamp(2rem, 7vw, 4.2rem); letter-spacing: .12em; white-space: nowrap; }
      .meta { text-align: right; color: var(--muted); }
      .meta p, .brand { margin: 0; }
      .lead { padding: 24px 0; border-bottom: 3px solid var(--ink); }
      .lead-top { display: grid; grid-template-columns: 1fr auto; gap: 22px; align-items: start; }
      h2 { margin: 0; font-size: clamp(2rem, 6vw, 4.6rem); line-height: 1.12; letter-spacing: .04em; }
      .seal {
        width: 76px;
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        border: 4px double var(--seal);
        border-radius: 50%;
        color: var(--seal);
        font-size: 1.25rem;
        font-weight: 800;
        transform: rotate(-8deg);
      }
      .headline-ja { margin: 10px 0 18px; color: var(--muted); font-size: 1.05rem; }
      .columns { columns: 2 280px; column-gap: 30px; column-rule: 1px solid rgba(23,19,15,.45); }
      .columns p { margin: 0 0 1em; line-height: 1.9; text-align: justify; }
      .source {
        margin-top: 18px;
        padding: 12px 16px;
        border: 2px solid var(--ink);
        background: rgba(255,255,255,.1);
      }
      .source strong { margin-right: 10px; color: var(--paper-light); background: var(--ink); padding: 4px 8px; }
      .archive-title { margin: 24px 0 12px; font-size: 1.25rem; letter-spacing: .3em; }
      .archive { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); border: 1px solid var(--ink); }
      .archive article { padding: 16px; border: 1px solid var(--ink); }
      .archive h3 { margin: 8px 0 4px; font-size: 1.35rem; line-height: 1.35; }
      .archive p { margin: 6px 0 0; color: var(--muted); line-height: 1.55; }
      .headline-ja-sm { margin: 0 0 6px; color: var(--muted); font-size: .92rem; line-height: 1.4; }
      .tag { color: var(--seal); font-weight: 800; }
      .empty { padding: 80px 0; text-align: center; color: var(--muted); font-size: 1.2rem; }
      footer { margin-top: 24px; padding-top: 10px; border-top: 1px solid var(--ink); color: var(--muted); font-size: .85rem; }
      @media (max-width: 620px) {
        header { grid-template-columns: 1fr; text-align: center; }
        .brand, .meta { text-align: center; }
        h1 { grid-row: 1; white-space: normal; }
        .lead-top { grid-template-columns: 1fr; }
        .seal { width: 58px; }
        .banner span:nth-child(n+2) { display: none; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="banner"><span>號外！！</span><span>號外！！</span><span>號外！！</span></div>
      <header>
        <p class="brand">DaihonEiNews</p>
        <h1>大本営発表</h1>
        <div class="meta"><p>樂觀估計專刊</p><p id="issue"></p><time id="updated"></time></div>
      </header>
      <div id="content"></div>
      <footer>dahon-ei-report · 本报仅存于当前设备的 ~/.daihonei-news</footer>
    </main>
    <script>
      const encoded = "__DAIHONEI_DATA_BASE64__";
      const bytes = Uint8Array.from(atob(encoded), c => c.charCodeAt(0));
      const data = JSON.parse(new TextDecoder().decode(bytes));
      const content = document.querySelector("#content");
      const escapeText = value => String(value ?? "");
      const dateText = iso => {
        const date = new Date(iso);
        return Number.isNaN(date.getTime()) ? escapeText(iso) : date.toLocaleString();
      };
      const add = (parent, tag, className, text) => {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text !== undefined) node.textContent = text;
        parent.appendChild(node);
        return node;
      };
      document.querySelector("#issue").textContent = `第${data.dispatches.length}號`;
      document.querySelector("#updated").textContent = dateText(data.updated_at);
      if (!data.dispatches.length) {
        add(content, "p", "empty", "尚無發表。請在 Cursor 中呼叫 /dahon-ei-report 出刊。");
      } else {
        const [lead, ...archive] = data.dispatches;
        const story = add(content, "article", "lead");
        const top = add(story, "div", "lead-top");
        add(top, "h2", "", escapeText(lead.headline));
        add(top, "div", "seal", escapeText(lead.irony_tag));
        add(story, "p", "headline-ja", escapeText(lead.headline_ja));
        const columns = add(story, "div", "columns");
        add(columns, "p", "", escapeText(lead.lede));
        add(columns, "p", "", `〔和訳〕${escapeText(lead.lede_ja)}`);
        if (lead.conversation_hint) add(columns, "p", "", `【戰況附記】${escapeText(lead.conversation_hint)}`);
        const source = add(story, "div", "source");
        add(source, "strong", "", "前線實報");
        source.append(document.createTextNode(`「${escapeText(lead.source_claim)}」`));
        if (archive.length) {
          add(content, "h2", "archive-title", "既往發表");
          const grid = add(content, "section", "archive");
          archive.forEach((item, index) => {
            const card = add(grid, "article");
            add(card, "span", "tag", `${escapeText(item.irony_tag)} · 第${data.dispatches.length - index - 1}號`);
            add(card, "h3", "", escapeText(item.headline));
            add(card, "p", "headline-ja-sm", escapeText(item.headline_ja));
            add(card, "p", "", escapeText(item.source_claim));
            add(card, "p", "", dateText(item.created_at));
          });
        }
      }
    </script>
  </body>
</html>
